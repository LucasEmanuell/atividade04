<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eixos 3D em RA</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; }

      #feedback {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        font-family: sans-serif;
        font-size: 14px;
        padding: 8px 18px;
        border-radius: 20px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 999;
      }
      #feedback.visible { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="feedback">Aponte para o marker Hiro</div>

    <a-scene
      arjs="sourceType: webcam; debugUIEnabled: false;"
      renderer="logarithmicDepthBuffer: true; antialias: true;"
      vr-mode-ui="enabled: false"
    >
      <a-marker preset="hiro" id="marcador"
                smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">

        <!-- Grupo principal: a escala muda na interação de segurar -->
        <a-entity id="grupo-eixos">

          <!-- Ponto de origem -->
          <a-sphere radius="0.05" color="#1e1e1e" position="0 0.05 0"></a-sphere>

          <!-- Eixo X (vermelho) -->
          <a-cylinder radius="0.02" height="0.84" color="#e03131"
                      position="0.42 0.05 0" rotation="0 0 -90"></a-cylinder>
          <a-cone radius-bottom="0.05" radius-top="0" height="0.14" color="#e03131"
                  position="0.9 0.05 0" rotation="0 0 -90"></a-cone>
          <a-text value="X" color="#e03131" position="1.1 0.2 0"
                  scale="2 2 2" align="center"></a-text>

          <!-- Eixo Y (verde) -->
          <a-cylinder radius="0.02" height="0.84" color="#2f9e44"
                      position="0 0.47 0"></a-cylinder>
          <a-cone radius-bottom="0.05" radius-top="0" height="0.14" color="#2f9e44"
                  position="0 0.97 0"></a-cone>
          <a-text value="Y" color="#2f9e44" position="0.18 1.12 0"
                  scale="2 2 2" align="center"></a-text>

          <!-- Eixo Z (azul) -->
          <a-cylinder radius="0.02" height="0.84" color="#1971c2"
                      position="0 0.05 0.42" rotation="90 0 0"></a-cylinder>
          <a-cone radius-bottom="0.05" radius-top="0" height="0.14" color="#1971c2"
                  position="0 0.05 0.9" rotation="90 0 0"></a-cone>
          <a-text value="Z" color="#1971c2" position="-0.18 0.2 1.08"
                  scale="2 2 2" align="center" rotation="0 180 0"></a-text>

          <!-- Vetor v (roxo), comeca escondido -->
          <!-- Escala de 0→1 ao surgir, animada via evento mostrarVetor -->
          <a-entity id="vetor" visible="false" position="0 0.05 0"
                    animation__aparecer="property: scale; from: 0 0 0; to: 1 1 1;
                                         dur: 400; easing: easeOutBack; autoplay: false;
                                         startEvents: mostrarVetor"
                    animation__sumir="property: scale; from: 1 1 1; to: 0 0 0;
                                      dur: 200; easing: easeInQuad; autoplay: false;
                                      startEvents: esconderVetor">
            <!-- Seta do vetor rotacionada para direção ~(2,1,1) -->
            <a-entity rotation="0 30 -65">
              <a-cylinder radius="0.03" height="0.82" color="#9c36b5"
                          position="0 0.41 0"></a-cylinder>
              <a-cone radius-bottom="0.065" radius-top="0" height="0.15" color="#9c36b5"
                      position="0 0.9 0"></a-cone>
            </a-entity>
          </a-entity>

          <!-- Label de coordenadas aparece junto com o vetor -->
          <a-text id="label-coords" value="v = (2, 1, 1)" color="#9c36b5"
                  visible="false" position="0.55 0.9 0.25"
                  scale="1.6 1.6 1.6" align="center"></a-text>

        </a-entity>

        <!-- Plano invisível clicável que cobre toda a área do marker -->
        <a-plane class="clickable" width="3" height="3" opacity="0"
                 position="0 0.01 0" rotation="-90 0 0"
                 eixos-interacao></a-plane>

      </a-marker>

      <a-entity camera>
        <a-entity
          cursor="fuse: false; rayOrigin: mouse"
          raycaster="objects: .clickable; far: 100"
        ></a-entity>
      </a-entity>
    </a-scene>

    <script>
      AFRAME.registerComponent('eixos-interacao', {
        init: function () {
          const marcador    = document.getElementById('marcador');
          const grupoEixos  = document.getElementById('grupo-eixos');
          const vetor       = document.getElementById('vetor');
          const labelCoords = document.getElementById('label-coords');
          const feedback    = document.getElementById('feedback');
          let vetorVisivel  = false;
          let feedbackTimer = null;
          const escalaBase   = { x: 1,   y: 1,   z: 1   };
          const escalaGrande = { x: 1.5, y: 1.5, z: 1.5 };

          function mostrarFeedback(msg) {
            feedback.textContent = msg;
            feedback.classList.add('visible');
            clearTimeout(feedbackTimer);
            feedbackTimer = setTimeout(() => feedback.classList.remove('visible'), 2000);
          }

          // Interação 1: toque rápido → gera ou remove o vetor v
          this.el.addEventListener('click', function () {
            vetorVisivel = !vetorVisivel;
            if (vetorVisivel) {
              vetor.setAttribute('visible', true);
              vetor.emit('mostrarVetor');
              labelCoords.setAttribute('visible', true);
              mostrarFeedback('▶ vetor v = (2, 1, 1)');
            } else {
              vetor.emit('esconderVetor');
              labelCoords.setAttribute('visible', false);
              setTimeout(() => vetor.setAttribute('visible', false), 200);
              mostrarFeedback('Vetor removido');
            }
          });

          // Interação 2: pressionar e segurar → zoom para inspecionar os eixos
          this.el.addEventListener('mousedown', function () {
            grupoEixos.setAttribute('scale', escalaGrande);
            mostrarFeedback('Inspecionando eixos...');
          });

          this.el.addEventListener('mouseup', function () {
            grupoEixos.setAttribute('scale', escalaBase);
          });

          // Reseta escala se o marker sumir enquanto usuário segura
          marcador.addEventListener('markerLost', function () {
            grupoEixos.setAttribute('scale', escalaBase);
          });

          marcador.addEventListener('markerFound', function () {
            mostrarFeedback('Toque para gerar o vetor v');
          });
        }
      });
    </script>
  </body>
</html>
